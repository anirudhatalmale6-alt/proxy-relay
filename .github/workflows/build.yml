name: Build ProxyRelay Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller Pillow

      - name: Build ProxyRelay EXE
        run: pyinstaller --onefile --windowed --name ProxyRelay proxy_relay.py

      - name: Build KernelChanger EXE
        run: pyinstaller --onefile --windowed --name KernelChanger kernel_changer.py

      - name: Build QueueDashboard EXE
        run: pyinstaller --onefile --windowed --name QueueDashboard queue_dashboard.py

      - name: Upload ProxyRelay
        uses: actions/upload-artifact@v4
        with:
          name: ProxyRelay-Windows
          path: dist/ProxyRelay.exe

      - name: Upload KernelChanger
        uses: actions/upload-artifact@v4
        with:
          name: KernelChanger-Windows
          path: dist/KernelChanger.exe

      - name: Upload QueueDashboard
        uses: actions/upload-artifact@v4
        with:
          name: QueueDashboard-Windows
          path: dist/QueueDashboard.exe
