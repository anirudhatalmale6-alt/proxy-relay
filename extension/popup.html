<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Relay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f23;
      color: #fff;
    }
    .app { padding: 16px; }
    .header {
      text-align: center;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 1px;
    }
    .header .sub {
      font-size: 9px;
      color: #666;
      margin-top: 2px;
    }
    .status-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      margin-bottom: 12px;
    }
    .status-text {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .status-text.connected { color: #4CAF50; }
    .status-text.disconnected { color: #ff6b6b; }
    .status-text.error { color: #ff9800; }
    .proxy-display {
      font-family: 'Consolas', monospace;
      font-size: 11px;
      color: #8888aa;
    }
    .proxy-display.active { color: #44dd44; }
    .count {
      font-size: 9px;
      color: #555;
      margin-top: 4px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 6px;
      color: #fff;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-connect { background: #4CAF50; }
    .btn-rotate { background: #FF9800; }
    .btn-disconnect { background: #f44336; }
    .error-bar {
      display: none;
      margin-top: 8px;
      padding: 6px 8px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      font-size: 9px;
      color: #ef4444;
      word-break: break-all;
    }
    .setup-hint {
      margin-top: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      font-size: 8px;
      color: #555;
      line-height: 1.4;
    }
    .setup-hint b { color: #888; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>PROXY RELAY</h1>
      <div class="sub">Control your local proxy relay</div>
    </div>

    <div class="status-card">
      <div class="status-text disconnected" id="statusText">CHECKING...</div>
      <div class="proxy-display" id="proxyDisplay">Connecting to relay...</div>
      <div class="count" id="proxyCount"></div>
    </div>

    <button class="btn btn-connect" id="btnConnect" disabled>CONNECT</button>
    <button class="btn btn-rotate" id="btnRotate" disabled>ROTATE PROXY</button>
    <button class="btn btn-disconnect" id="btnDisconnect" disabled>DISCONNECT</button>

    <div class="error-bar" id="errorBar"></div>

    <div class="setup-hint" id="setupHint">
      <b>Setup:</b> Run ProxyRelay.exe on your PC.<br>
      Set AdsPower profile proxy to <b>127.0.0.1:8899</b> (HTTP).
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
